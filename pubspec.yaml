name: simple_gaming_flutter
description: "SimpleGaming Flutter port."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Localisation
  intl: any

  # State
  flutter_riverpod: ^2.6.0
  riverpod_annotation: ^2.6.0

  # Immutable models + sealed state
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.0.0

  # Network
  dio: ^5.7.0

  # Firebase
  firebase_core: ^4.2.1
  firebase_auth: ^6.1.2
  cloud_firestore: ^6.1.0
  google_sign_in: ^7.2.0

  # UI
  shimmer: ^3.0.0
  lottie: ^3.1.0
  cached_network_image: ^3.4.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code quality
  flutter_lints: ^5.0.0
  # dart_code_metrics incompatible with current riverpod_generator (uuid version conflict)
  # revisit when a compatible version is available

  # Testing
  mocktail: ^0.3.0

  # Code generation
  build_runner: ^2.4.0
  freezed: ^2.5.0
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.0

flutter:
  uses-material-design: true
  generate: true
